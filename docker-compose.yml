name: cms-admin-node-javascript-ssr

services:
  app:
    container_name: cms-admin-node-javascript-ssr
    build: .
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5000"
      API_BASE_URL: "${API_BASE_URL:-http://host.docker.internal:3000}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
